"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ÔûæÔûÆÔûô](bg:none fg:surface0)${custom.directory_type}\
[¯âù](fg:base bg:prev_bg)\
[¯âù](fg:prev_bg bg:base)\
$directory\
$git_branch${custom.git_uncommitted}\
[¯âù](fg:prev_bg bg:base)\
$git_state\
$fill\
${custom.git_url}\
${custom.git_email}\
[¯âû](fg:surface0 bg:base)\
[¯âû](fg:base bg:surface0)[ ¯«í  ](bg:surface0 fg:text)[ÔûôÔûÆÔûæ](bg:none fg:surface0)
$line_break\
$character
"""

# [¯é▓](fg:surface1 bg:prev_bg)[ ¯«í  ](bg:surface1 fg:text)[ÔûôÔûÆÔûæ](bg:none fg:surface1)
# [Ôûê](fg:prev_bg bg:none)\


add_newline = true
palette = "catppuccin_mocha"

[fill]
symbol = 'Ôûê'
style = 'fg:surface0'

[character]
format = " $symbol "

[custom.directory_type]
command = """
if "git rev-parse --git-dir 2> /dev/null"; then 
  echo "´äí'"
else 
  echo "´ôö "
fi
"""
when = "true"
format = "[ $output ]($style)"
style = "bg:surface0 fg:text"

[directory]
format = "[ $path ]($style)[¯âù](fg:base bg:prev_bg)"
truncate_to_repo = false
truncation_length = 2
truncation_symbol = "../"
home_symbol = "~"
style = "bg:surface0 fg:text"

[git_branch]
format = '[¯âù](fg:prev_bg bg:base)[ $symbol$branch(:$remote_branch) ]($style)'
symbol = "´Éÿ "
style = "fg:text bg:surface0"

[custom.git_uncommitted]
description = "Display the number of uncommitted changed files"
command = "git status --porcelain | wc -l"
when = "git rev-parse --git-dir 2> /dev/null"
symbol = "¾░ªÆ"
format = '[$symbol$output ]($style)[¯âù](fg:base bg:prev_bg)'
style = "fg:text bg:surface0"

[custom.git_email]
description = "Display the git user email"
command = "git config user.email"
when = "git rev-parse --git-dir 2> /dev/null"
symbol = " ´ïÇ "
format = "[¯âû](fg:surface0 bg:base)[¯âû](fg:base bg:surface0)[$symbol $output ](bg:surface0 fg:subtext0)"

[custom.git_url]
description = "Display the git remote url"
command = "git config --get remote.origin.url | sed -E 's#(git@|https://)([^:/]+)[:/]##'"
when = "git config --get remote.origin.url > /dev/null 2>&1"
symbol = " ´âü "
format = "[¯âû](fg:surface0 bg:base)[¯âû](fg:base bg:surface0)[$symbol $output ](bg:surface0 fg:subtext0)"

